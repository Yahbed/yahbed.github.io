<title>Catálogo de Productos — INDRAM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#222}

/* NAV */
nav{background:#1a2f5a;padding:0 24px;height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.brand{color:#fff;font-weight:800;font-size:1.15rem;letter-spacing:.5px;text-decoration:none}
.brand span{color:#e8b94a}
.nav-links{margin-left:auto;display:flex;gap:20px}
.nav-links a{color:#aac4ff;font-size:.85rem;text-decoration:none}
.nav-links a:hover{color:#fff}

/* CATEGORY TABS */
.cat-tabs{background:#fff;border-bottom:2px solid #e0e4ed;position:sticky;top:56px;z-index:100;overflow-x:auto}
.cat-tabs-inner{display:flex;min-width:max-content;padding:0 16px}
.ctab{padding:13px 18px;border:none;background:none;cursor:pointer;font-size:.88rem;font-weight:600;color:#666;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s}
.ctab:hover{color:#1a2f5a}
.ctab.active{color:#1a2f5a;border-bottom-color:#e8b94a}
.ctab-cnt{background:#e8b94a;color:#1a2f5a;border-radius:20px;padding:1px 7px;font-size:.73rem;margin-left:4px;font-weight:700}

/* MODEL FILTER BAR */
.model-bar{background:#f8f9fb;border-bottom:1px solid #e8ecf2;padding:10px 20px;display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.model-bar-label{font-size:.78rem;color:#999;font-weight:600;margin-right:4px}
.mpill{padding:5px 13px;border:1.5px solid #d0d6e2;border-radius:20px;background:#fff;cursor:pointer;font-size:.8rem;font-weight:600;color:#555;transition:all .15s;white-space:nowrap}
.mpill:hover{border-color:#1a2f5a;color:#1a2f5a}
.mpill.active{background:#1a2f5a;border-color:#1a2f5a;color:#fff}

/* PAGE HEADER */
.pg-header{padding:14px 24px 8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.pg-title{font-size:1.05rem;font-weight:700;color:#1a2f5a}
.pager{display:flex;align-items:center;gap:8px}
.pager button{padding:5px 14px;border:1.5px solid #1a2f5a;border-radius:6px;background:#fff;color:#1a2f5a;cursor:pointer;font-weight:600;font-size:.85rem}
.pager button:hover{background:#1a2f5a;color:#fff}
.pager button:disabled{opacity:.3;cursor:default}
.pinfo{min-width:90px;text-align:center;font-size:.85rem;color:#666}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:10px 20px 28px}
.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.09);cursor:pointer;display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.14)}
.card img{width:100%;aspect-ratio:1;object-fit:cover;background:#e8ecf0;display:block}
.card-info{padding:7px 9px 9px;border-top:1px solid #f2f2f2}
.card-model{font-weight:700;font-size:.75rem;color:#1a2f5a;line-height:1.2}
.card-color{font-size:.72rem;color:#888;margin-top:2px}

/* LIGHTBOX */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:1000;flex-direction:column;align-items:center;justify-content:center}
#lb.open{display:flex}
#lb-x{position:absolute;top:14px;right:18px;color:#fff;font-size:2rem;cursor:pointer;background:none;border:none;line-height:1;z-index:2}
#lb-img{max-width:88vw;max-height:72vh;object-fit:contain;border-radius:6px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
#lb-label{color:#ddd;font-size:.9rem;margin-top:10px;text-align:center}
#lb-nav{display:flex;align-items:center;gap:20px;margin-top:12px}
#lb-nav button{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.8rem;width:46px;height:46px;border-radius:50%;cursor:pointer}
#lb-nav button:hover{background:rgba(255,255,255,.28)}
#lb-cnt{color:#bbb;font-size:.85rem;min-width:70px;text-align:center}
</style>
</head>

_PRODUCTO_INDRAM_5/01-08-03 DIEGO RAMIREZ PRODUCTO INDRAM 5-61.jpg", "m": "VASO MAGICO CAFE 16 OZ", "c": "VERDE PERLA"}, {"u": "fotos/01-08-03_DIEGO_RAMIREZ_PRODUCTO_INDRAM_5/01-08-03 DIEGO RAMIREZ PRODUCTO INDRAM 5-62.jpg", "m": "VASO MAGICO CAFE 16 OZ", "c": "VERDE PERLA"}, {"u": "fotos/01-08-03_DIEGO_RAMIREZ_PRODUCTO_INDRAM_5/01-08-03 DIEGO RAMIREZ PRODUCTO INDRAM 5-63.jpg", "m": "VASO MAGICO CAFE 16 OZ", "c": "VERDE PERLA"}, {"u": "fotos/01-08-03_DIEGO_RAMIREZ_PRODUCTO_INDRAM_5/01-08-03 DIEGO RAMIREZ PRODUCTO INDRAM 5-64.jpg", "m": "VASO MAGICO CAFE 16 OZ", "c": "VERDE PERLA"}, {"u": "fotos/01-08-03_DIEGO_RAMIREZ_PRODUCTO_INDRAM_5/01-08-03 DIEGO RAMIREZ PRODUCTO INDRAM 5-65.jpg", "m": "VASO MAGICO CAFE 16 OZ", "c": "VERDE PERLA"}, {"u": "fotos/01-08-03_DIEGO_RAMIREZ_PRODUCTO_INDRAM_5/01-08-03 DIEGO RAMIREZ PRODUCTO INDRAM 5-69.jpg", "m": "VASO MAGICO CAFE 16 OZ", "c": "ROJO"}, {"u": "fotos/01-08-03_DIEGO_RAMIREZ_PRODUCTO_INDRAM_5/01-08-03 DIEGO RAMIREZ PRODUCTO INDRAM 5-70.jpg", "m": "VASO MAGICO CAFE 16 OZ", "c": "ROJO"}, {"u": "fotos/01-08-03_DIEGO_RAMIREZ_PRODUCTO_INDRAM_5/01-08-03 DIEGO RAMIREZ PRODUCTO INDRAM 5-71.jpg", "m": "VASO MAGICO CAFE 16 OZ", "c": "ROJO"}, {"u": "fotos/01-08-03_DIEGO_RAMIREZ_PRODUCTO_INDRAM_5/01-08-03 DIEGO RAMIREZ PRODUCTO INDRAM 5-73.jpg", "m": "VASO MAGICO CAFE 16 OZ", "c": "ROJO"}, {"u": "fotos/01-08-03_DIEGO_RAMIREZ_PRODUCTO_INDRAM_5/01-08-03 DIEGO RAMIREZ PRODUCTO INDRAM 5-74.jpg", "m": "VASO MAGICO POPOTE 16 OZ", "c": "AZUL"}, {"u": "fotos/01-08-03_DIEGO_RAMIREZ_PRODUCTO_INDRAM_5/01-08-03 DIEGO RAMIREZ PRODUCTO INDRAM 5-75.jpg", "m": "VASO MAGICO CAFE 16 OZ", "c": "AZUL"}, {"u": "fotos/01-08-03_DIEGO_RAMIREZ_PRODUCTO_INDRAM_5/01-08-03 DIEGO RAMIREZ PRODUCTO INDRAM 5-66.jpg", "m": "VASO MAGICO POPOTE 16 OZ", "c": "ROJO"}, {"u": "fotos/01-08-03_DIEGO_RAMIREZ_PRODUCTO_INDRAM_5/01-08-03 DIEGO RAMIREZ PRODUCTO INDRAM 5-67.jpg", "m": "VASO MAGICO POPOTE 16 OZ", "c": "ROJO"}, {"u": "fotos/01-08-03_DIEGO_RAMIREZ_PRODUCTO_INDRAM_5/01-08-03 DIEGO RAMIREZ PRODUCTO INDRAM 5-68.jpg", "m": "VASO MAGICO POPOTE 16 OZ", "c": "ROJO"}, {"u": "fotos/01-08-03_DIEGO_RAMIREZ_PRODUCTO_INDRAM_5/01-08-03 DIEGO RAMIREZ PRODUCTO INDRAM 5-72.jpg", "m": "VASO MAGICO POPOTE 16 OZ", "c": "ROJO"}]};
const MODELS={"botanero": ["BOTANERO 500 ML", "BOTANERO 800 ML"], "cafetero": ["VASO 16 OZ CAFE", "VASO 16 OZ CAFETERO TAPA COLOR", "VASO 16 OZ GLITTER TAPA CAFE COLOR", "VASO 24 OZ CAFETERO", "VASO 24 OZ CAFETERO Y GLITTER"], "popote": ["VASO 24 OZ CON POPOTE Y GLITTER MULTICOLOR", "VASO 24 OZ POPOTE", "VASO 24 OZ POPOTE GLITTER", "VASO 400 ML CON POPOTE", "VASO 400 ML CON POPOTE Y GLITTER MULTICOLOR"], "especial": ["TERMO DOBLE PARED", "VASO KIDZ", "VASO MAGICO CAFE", "VASO MAGICO CAFE 16 OZ", "VASO MAGICO POPOTE", "VASO MAGICO POPOTE 16 OZ"], "estuche": ["ESTUCHE PUPILENTE"], "taza": ["TAZA ELEGANCE"], "tequilero": ["TEQUILERO 2 OZ"]};

const PER=60;
let curCat=CATS[0].id, curModel='__all__', curPage=0;
let lbList=[], lbIdx=0;

// Build tabs
const tabsEl=document.getElementById('cat-tabs');
CATS.forEach(c=>{
  const b=document.createElement('button');
  b.className='ctab';b.id='ctab-'+c.id;
  b.innerHTML=c.icon+' '+c.label+' <span class="ctab-cnt">'+c.count+'</span>';
  b.onclick=()=>switchCat(c.id);
  tabsEl.appendChild(b);
});

function switchCat(id){
  curCat=id;curModel='__all__';curPage=0;
  document.querySelectorAll('.ctab').forEach(b=>b.classList.remove('active'));
  document.getElementById('ctab-'+id).classList.add('active');
  buildModelBar();
  render();
}

function buildModelBar(){
  const bar=document.getElementById('model-bar');
  bar.innerHTML='<span class="model-bar-label">Modelo:</span>';
  const all=document.createElement('button');
  all.className='mpill'+(curModel==='__all__'?' active':'');
  all.textContent='Todos';all.onclick=()=>setModel('__all__');
  bar.appendChild(all);
  (MODELS[curCat]||[]).forEach(m=>{
    const b=document.createElement('button');
    b.className='mpill'+(curModel===m?' active':'');
    b.textContent=m;b.onclick=()=>setModel(m);
    bar.appendChild(b);
  });
}

function setModel(m){
  curModel=m;curPage=0;
  document.querySelectorAll('.mpill').forEach(b=>{
    b.classList.toggle('active', b.textContent===(m==='__all__'?'Todos':m));
  });
  render();
}

function getFiltered(){
  const items=DATA[curCat]||[];
  return curModel==='__all__' ? items : items.filter(p=>p.m===curModel);
}

function render(){
  const items=getFiltered();
  const tot=items.length, pages=Math.ceil(tot/PER)||1, s=curPage*PER;
  const slice=items.slice(s,Math.min(s+PER,tot));
  lbList=items;

  const meta=CATS.find(c=>c.id===curCat);
  const mLabel=curModel==='__all__'?meta.label:curModel;
  document.getElementById('pg-title').textContent=meta.icon+' '+mLabel+' — '+tot+' fotos';
  document.getElementById('pinfo').textContent='Pág '+(curPage+1)+'/'+pages;
  document.getElementById('pp').disabled=curPage===0;
  document.getElementById('pn').disabled=curPage>=pages-1;

  const g=document.getElementById('grid');
  g.innerHTML='';
  slice.forEach((item,i)=>{
    const gI=s+i;
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML='<img src="'+item.u+'" loading="lazy" alt="'+item.m+'" onerror="this.style.opacity=\'.2\'">'
      +'<div class="card-info"><div class="card-model">'+item.m+'</div>'
      +(item.c?'<div class="card-color">'+item.c+'</div>':'')+'</div>';
    card.onclick=()=>openLB(gI);
    g.appendChild(card);
  });
}

function changePage(dir){
  const pages=Math.ceil(getFiltered().length/PER)||1;
  curPage=Math.max(0,Math.min(curPage+dir,pages-1));
  render();window.scrollTo({top:110,behavior:'smooth'});
}

function openLB(idx){lbIdx=idx;updateLB();document.getElementById('lb').classList.add('open');}
function updateLB(){
  const p=lbList[lbIdx];
  document.getElementById('lb-img').src=p.u;
  document.getElementById('lb-label').textContent=p.m+(p.c?' — '+p.c:'');
  document.getElementById('lb-cnt').textContent=(lbIdx+1)+' / '+lbList.length;
}
function lbStep(d){lbIdx=(lbIdx+d+lbList.length)%lbList.length;updateLB();}
function closeLB(){document.getElementById('lb').classList.remove('open');}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lb').classList.contains('open'))return;
  if(e.key==='ArrowRight')lbStep(1);
  if(e.key==='ArrowLeft')lbStep(-1);
  if(e.key==='Escape')closeLB();
});

switchCat(CATS[0].id);

</script>
